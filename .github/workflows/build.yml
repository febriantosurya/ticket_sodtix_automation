name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: TicketBot-linux.zip
          - os: windows-latest
            asset_name: TicketBot-windows.zip
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build
        env:
          QT_QPA_PLATFORM: offscreen
        run: >
          pyinstaller --onedir --name TicketBot --collect-all PyQt6
          --exclude-module PyQt6.QtWebEngineWidgets
          --exclude-module PyQt6.QtWebEngineCore
          --exclude-module PyQt6.QtWebEngine
          --exclude-module PyQt6.QtMultimedia
          --exclude-module PyQt6.QtMultimediaWidgets
          --exclude-module PyQt6.QtBluetooth
          --exclude-module PyQt6.QtNfc
          --exclude-module PyQt6.QtPositioning
          --exclude-module PyQt6.QtLocation
          --exclude-module PyQt6.Qt3DCore
          --exclude-module PyQt6.Qt3DRender
          --exclude-module PyQt6.Qt3DInput
          --exclude-module PyQt6.Qt3DLogic
          --exclude-module PyQt6.Qt3DAnimation
          --exclude-module PyQt6.Qt3DExtras
          --exclude-module PyQt6.QtCharts
          --exclude-module PyQt6.QtDataVisualization
          --exclude-module PyQt6.QtQuick
          --exclude-module PyQt6.QtQuickWidgets
          --exclude-module PyQt6.QtQml
          --exclude-module PyQt6.QtSql
          --exclude-module PyQt6.QtTest
          --exclude-module matplotlib
          --exclude-module numpy
          --exclude-module PIL
          app.py

      - name: Zip artifact (Linux)
        if: runner.os == 'Linux'
        run: cd dist && zip -r ../${{ matrix.asset_name }} TicketBot/

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/TicketBot -DestinationPath ${{ matrix.asset_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Get date tag
        id: date
        run: echo "tag=v$(date +'%Y-%m-%d')-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.date.outputs.tag }}
          name: Release ${{ steps.date.outputs.tag }}
          body: |
            ## Download

            | Platform | File |
            |----------|------|
            | Linux    | `TicketBot-linux.zip` |
            | Windows  | `TicketBot-windows.zip` |

            Place `info.json` in the same folder as the executable before running.
            See [README](README.md) for setup instructions.
          files: artifacts/*
          overwrite: true
