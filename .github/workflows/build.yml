name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: TicketBot-linux
          - os: windows-latest
            asset_name: TicketBot-windows.exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build
        env:
          QT_QPA_PLATFORM: offscreen
        run: pyinstaller --onefile --name TicketBot --collect-all PyQt6 app.py

      - name: Rename artifact (Linux)
        if: runner.os == 'Linux'
        run: mv dist/TicketBot dist/${{ matrix.asset_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: mv dist/TicketBot.exe dist/${{ matrix.asset_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          body: |
            ## Download

            | Platform | File |
            |----------|------|
            | Linux    | `TicketBot-linux` |
            | Windows  | `TicketBot-windows.exe` |

            Place `info.json` in the same folder as the executable before running.
            See [README](README.md) for setup instructions.
          files: artifacts/*
